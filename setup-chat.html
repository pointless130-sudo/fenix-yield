<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
<title>Fenix Yield — Setup Assistant</title>
<style>
:root {
  --bg:      #0a0a0f;
  --surface: #13131a;
  --surface2:#1a1a24;
  --border:  #1e1e2e;
  --accent:  #7c5cfc;
  --accent2: #4fc3f7;
  --success: #4caf7d;
  --text:    #e8e8f0;
  --muted:   #6b6b8a;
  --font:    'Inter', system-ui, sans-serif;
  --mono:    'SF Mono', 'Fira Code', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  display: flex;
  flex-direction: column;
  height: 100dvh;
}

/* ── Header ── */
.header {
  background: linear-gradient(160deg, #0e0e1a, #12102a);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}

.header-logo {
  width: 36px; height: 36px;
  border-radius: 10px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}

.header-info { flex: 1; }
.header-info h1 { font-size: 15px; font-weight: 600; letter-spacing: -0.2px; }
.header-info p  { font-size: 12px; color: var(--success); margin-top: 1px; }

.header-link {
  font-size: 12px; color: var(--muted);
  text-decoration: none; padding: 6px 12px;
  border: 1px solid var(--border); border-radius: 8px;
  transition: all 0.15s; flex-shrink: 0;
}
.header-link:hover { border-color: var(--accent); color: var(--text); }

/* ── Progress bar ── */
.progress-bar {
  height: 3px;
  background: var(--border);
  flex-shrink: 0;
  position: relative;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  width: 0%;
  transition: width 0.5s ease;
}

/* ── Step indicator ── */
.step-indicator {
  display: flex;
  gap: 4px;
  padding: 10px 20px 8px;
  overflow-x: auto;
  scrollbar-width: none;
  flex-shrink: 0;
  border-bottom: 1px solid var(--border);
}
.step-indicator::-webkit-scrollbar { display: none; }

.step-dot {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 600; color: var(--muted);
  flex-shrink: 0; transition: all 0.2s; cursor: default;
}
.step-dot.active {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(124,92,252,0.1);
}
.step-dot.done {
  border-color: var(--success);
  background: var(--success);
  color: #fff;
}

/* ── Chat area ── */
.chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 20px 16px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  scroll-behavior: smooth;
}

/* ── Messages ── */
.msg {
  display: flex;
  gap: 10px;
  max-width: 100%;
  animation: fadeUp 0.2s ease;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.msg.user { flex-direction: row-reverse; }

.msg-avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0; margin-top: 2px;
}

.msg.bot .msg-avatar {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
}

.msg.user .msg-avatar {
  background: var(--surface2);
  border: 1px solid var(--border);
}

.msg-bubble {
  max-width: calc(100% - 48px);
  padding: 12px 14px;
  border-radius: 14px;
  font-size: 14px;
  line-height: 1.6;
}

.msg.bot .msg-bubble {
  background: var(--surface);
  border: 1px solid var(--border);
  border-top-left-radius: 4px;
  color: var(--text);
}

.msg.user .msg-bubble {
  background: linear-gradient(135deg, var(--accent), #5b3fd8);
  color: #fff;
  border-top-right-radius: 4px;
}

.msg-bubble p { margin-bottom: 8px; }
.msg-bubble p:last-child { margin-bottom: 0; }

.msg-bubble .copy-addr {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 10px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--accent2);
  margin: 8px 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  word-break: break-all;
}

.copy-mini {
  background: var(--border);
  border: none; border-radius: 4px;
  padding: 3px 8px; font-size: 10px;
  color: var(--muted); cursor: pointer;
  flex-shrink: 0; transition: all 0.15s;
}
.copy-mini:hover { background: var(--accent); color: #fff; }

/* ── Quick replies ── */
.quick-replies {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding: 0 16px 12px;
  flex-shrink: 0;
}

.qr-btn {
  padding: 8px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-family: var(--font);
  font-size: 13px;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.qr-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}

/* ── Typing indicator ── */
.typing {
  display: flex; gap: 10px; align-items: center;
}
.typing-dots {
  display: flex; gap: 4px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  border-top-left-radius: 4px;
  padding: 12px 16px;
}
.typing-dots span {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--muted);
  animation: bounce 1.2s infinite;
}
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes bounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30%            { transform: translateY(-5px); opacity: 1; }
}

/* ── Input area ── */
.input-area {
  border-top: 1px solid var(--border);
  padding: 12px 16px;
  display: flex;
  gap: 10px;
  align-items: flex-end;
  flex-shrink: 0;
  background: var(--bg);
}

.input-wrap {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  display: flex;
  align-items: flex-end;
  padding: 2px 4px 2px 14px;
  transition: border-color 0.15s;
}
.input-wrap:focus-within { border-color: var(--accent); }

#userInput {
  flex: 1;
  background: transparent;
  border: none;
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  resize: none;
  outline: none;
  max-height: 120px;
  min-height: 40px;
  padding: 10px 0;
  line-height: 1.5;
}
#userInput::placeholder { color: var(--muted); }

.send-btn {
  width: 36px; height: 36px;
  border-radius: 9px;
  border: none;
  background: linear-gradient(135deg, var(--accent), #5b3fd8);
  color: #fff;
  font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: opacity 0.15s;
  flex-shrink: 0;
  margin-bottom: 2px;
}
.send-btn:hover { opacity: 0.85; }
.send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

/* ── Checklist inside bubble ── */
.inline-check { 
  display: flex; align-items: center; gap: 8px;
  padding: 6px 0; font-size: 13px; color: var(--muted);
  cursor: pointer; user-select: none;
}
.inline-check.done { color: var(--success); }
.inline-check .ic-box {
  width: 18px; height: 18px; border-radius: 5px;
  border: 1.5px solid var(--muted);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; font-size: 11px; transition: all 0.15s;
}
.inline-check.done .ic-box { background: var(--success); border-color: var(--success); color: #fff; }

/* ── Step complete badge ── */
.step-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(76,175,125,0.15);
  border: 1px solid rgba(76,175,125,0.3);
  color: var(--success);
  border-radius: 20px;
  padding: 4px 12px; font-size: 12px; font-weight: 600;
  margin-top: 8px;
}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-logo">⚡</div>
  <div class="header-info">
    <h1>Fenix Yield Assistant</h1>
    <p>● Online — ready to help</p>
  </div>
  <a class="header-link" href="setup.html">📋 Step Guide</a>
</div>

<!-- Progress bar -->
<div class="progress-bar">
  <div class="progress-fill" id="progressFill"></div>
</div>

<!-- Step dots -->
<div class="step-indicator" id="stepIndicator">
  <div class="step-dot active" title="Apps">1</div>
  <div class="step-dot" title="MetaMask">2</div>
  <div class="step-dot" title="Buy ETH">3</div>
  <div class="step-dot" title="Safe Wallet">4</div>
  <div class="step-dot" title="Add Signer">5</div>
  <div class="step-dot" title="Fund Safe">6</div>
  <div class="step-dot" title="Safe Mobile">7</div>
  <div class="step-dot" title="Chat ID">8</div>
  <div class="step-dot" title="Register">9</div>
  <div class="step-dot" title="Done">✓</div>
</div>

<!-- Chat -->
<div class="chat-area" id="chatArea"></div>

<!-- Quick replies -->
<div class="quick-replies" id="quickReplies"></div>

<!-- Input -->
<div class="input-area">
  <div class="input-wrap">
    <textarea id="userInput" placeholder="Ask anything about setup..." rows="1"></textarea>
  </div>
  <button class="send-btn" id="sendBtn" onclick="sendMessage()">↑</button>
</div>

<script type="module">
// ── State ─────────────────────────────────────────────────────────────────────
const STEPS = [
  'Install apps',
  'Set up MetaMask',
  'Buy ETH',
  'Create Safe wallet',
  'Add bot signer',
  'Fund your Safe',
  'Set up Safe Mobile',
  'Get Telegram chat ID',
  'Register with bot',
  'Complete!'
];

let currentStep  = 0;
let conversation = [];
let isTyping     = false;

const SYSTEM_PROMPT = "You are the Fenix Yield onboarding assistant. Your job is to guide users through setting up the Fenix Yield automated ETH yield bot step by step.\n\nFenix Yield is a Telegram bot that automatically finds the best ETH yield across Lido, Curve, Aave, and Convex and proposes transactions to the user's Safe wallet. The user approves each transaction in Safe Mobile with one tap. The bot never holds or controls user funds.\n\nFENIX YIELD HAS THREE TIERS:\n- Scout tier (free): monitoring only — live APYs, portfolio tracking, risk alerts. No Safe wallet needed.\n- Optimizer tier ($19/mo, or save up to 20% with 3/6/12 month plans): everything in Scout PLUS daily yield automation. Bot proposes transactions to Safe, user approves in Safe Mobile with 1-3 taps.\n- Autopilot tier ($59/mo, or save up to 20% with 3/6/12 month plans): everything in Optimizer PLUS fully automatic execution via Zodiac Roles Module — no Safe Mobile approvals needed. Bot executes yield cycles, harvests Convex rewards every 6 hours, and compounds automatically.\n\nSETUP STEPS:\n1. Install 3 apps: Telegram, MetaMask, Safe Mobile\n2. Set up MetaMask wallet, save 12-word seed phrase, copy address\n3. Buy ETH on Coinbase, minimum 0.05 ETH, withdraw to MetaMask on Ethereum network\n4. Create a Safe wallet at app.safe.global, connect MetaMask, keep threshold 1 of 1, save Safe address\n5. Add bot proposer address as Safe owner: 0x739Df18DA29e0B9A408a1a66015f63B035112fBa via Settings, Owners, Add Owner\n6. Fund the Safe by sending ETH from MetaMask to Safe address, keep 0.005 ETH in MetaMask for gas\n7. Set up Safe Mobile, import Safe, connect MetaMask via WalletConnect, enable push notifications\n8. Get Telegram chat ID by messaging @userinfobot on Telegram, copy the number next to Id\n9. Register with @fenix_yield_bot on Telegram: send /start, enter your name, then type skip (Scout) or enter your invite code (paid tiers), then enter your Safe address and stake amount\n\nIMPORTANT FACTS:\n- Bot proposer address: 0x739Df18DA29e0B9A408a1a66015f63B035112fBa\n- Setup guide: https://fenix-yield.com/setup.html\n- Scout tier is completely free and open — no invite code needed, just /start and type skip when asked. Paid tiers get invite codes emailed automatically after payment via Chain2Pay. Code prefix determines tier: OPT- = Optimizer, APX- = Autopilot.\n\n- Autopilot requires Zodiac Roles Module setup via /whitelist after registration.\n- Safe address and MetaMask address are DIFFERENT\n- Always use Ethereum ERC-20 network when withdrawing from exchanges\n- Gas fees are under $0.10 per transaction\n- Bot CANNOT move funds without user approval unless whitelist is enabled\n- Minimum stake amount is 0.01 ETH, recommended 0.05 ETH or more\n- Commands: /balance, /positions, /dashboard, /apy, /stake, /setstake, /setprotocol, /harvest, /unstake, /pause, /resume, /guide, /status, /history, /winner, /whitelist, /start\n\nAUTOMATIC FEATURES:\n- Weekly reports: every Monday the bot automatically sends a yield summary with APY, P&L, and total earned\n- Risk alerts: bot monitors hourly and alerts if ETH drops 10 percent or more, protocol APY collapses below 0.1 percent, or a transaction is stuck 48 hours or more. Alerts only fire if user actually has funds in that protocol.\n- Auto-harvest Pro only: every 6 hours bot checks Convex rewards, if above $10 claims CRV and CVX, swaps to ETH via Uniswap with 1 percent slippage protection, ETH returns to Safe for next cycle\n\nWHITELIST FEATURE (optional, advanced):\n- /whitelist lets users enable fully automatic execution via Zodiac Roles Module\n- Without whitelist: bot proposes transactions, user approves in Safe Mobile each time\n- With whitelist: bot executes transactions automatically, no approvals needed\n- Bot can ONLY call whitelisted yield protocol functions: Lido stake, Curve LP, Aave deposit, Convex deposit, Convex harvest, CRV/CVX approve, Uniswap swap\n- Bot CANNOT send ETH to unknown addresses, change owners, or do anything outside the whitelist\n- User can disable anytime via /whitelist disable or via app.safe.global\n- Setup requires deploying Zodiac Roles Module via Safe app then running /whitelist setup\n- This is required for Autopilot tier and optional for Optimizer tier\n\nTRANSACTION QUEUE MANAGEMENT:\n- Safe wallet has a transaction queue with nonces. Transactions must execute in order.\n- Bot only proposes ONE transaction at a time and checks for pending ones first.\n- To skip a transaction: leave it in queue and bot reminds daily, or reject in Safe Mobile for small gas fee, or use /pause to stop the bot entirely until /resume\n- If queue is stuck: handle lowest nonce first. Use /status to see pending.\n- Ghost transactions are old ones already superseded on-chain. Bot ignores them automatically.\n- If Safe UI shows cannot execute: hard refresh with Ctrl+Shift+R, reconnect MetaMask, or try different browser.\n- To check current on-chain status: search the Safe address on etherscan.io\n\nTONE:\n- Assume ZERO crypto knowledge\n- Be warm, encouraging, and patient\n- Keep responses concise\n- Never use jargon without explaining it\n- When mentioning the proposer address always show it clearly\n\nSTEP TRACKING:\nWhen a user completes a step, include [STEP_COMPLETE] at the very end of your response.\nAlways be helpful, never make users feel stupid for not knowing crypto concepts."

// ── Rendering ─────────────────────────────────────────────────────────────────

function addMessage(role, content, showAvatar = true) {
  const area = document.getElementById('chatArea');
  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;

  if (showAvatar) {
    const av = document.createElement('div');
    av.className = 'msg-avatar';
    av.textContent = role === 'bot' ? '⚡' : '👤';
    wrap.appendChild(av);
  }

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = content;
  wrap.appendChild(bubble);
  area.appendChild(wrap);
  area.scrollTop = area.scrollHeight;

  // Wire up copy buttons inside bubble
  bubble.querySelectorAll('.copy-mini').forEach(btn => {
    btn.addEventListener('click', () => {
      const text = btn.previousElementSibling?.textContent || btn.dataset.copy;
      navigator.clipboard.writeText(text).then(() => {
        const orig = btn.textContent;
        btn.textContent = 'Copied!';
        btn.style.background = 'var(--success)';
        btn.style.color = '#fff';
        setTimeout(() => { btn.textContent = orig; btn.style.background = ''; btn.style.color = ''; }, 2000);
      });
    });
  });

  return wrap;
}

function showTyping() {
  const area = document.getElementById('chatArea');
  const wrap = document.createElement('div');
  wrap.className = 'typing';
  wrap.id = 'typingIndicator';
  wrap.innerHTML = `
    <div class="msg-avatar" style="background:linear-gradient(135deg,var(--accent),var(--accent2))">⚡</div>
    <div class="typing-dots"><span></span><span></span><span></span></div>`;
  area.appendChild(wrap);
  area.scrollTop = area.scrollHeight;
}

function hideTyping() {
  document.getElementById('typingIndicator')?.remove();
}

function setQuickReplies(options) {
  const qr = document.getElementById('quickReplies');
  qr.innerHTML = '';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'qr-btn';
    btn.textContent = opt;
    btn.onclick = () => {
      document.getElementById('userInput').value = opt;
      sendMessage();
    };
    qr.appendChild(btn);
  });
}

function updateProgress() {
  const pct = (currentStep / (STEPS.length - 1)) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.querySelectorAll('.step-dot').forEach((dot, i) => {
    dot.classList.remove('active', 'done');
    if (i < currentStep)       dot.classList.add('done');
    else if (i === currentStep) dot.classList.add('active');
  });
}

function markStepComplete() {
  if (currentStep < STEPS.length - 1) {
    currentStep++;
    updateProgress();
  }
}

function formatBotResponse(text) {
  // Remove [STEP_COMPLETE] marker from display
  text = text.replace('[STEP_COMPLETE]', '').trim();

  // Convert **bold** 
  text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

  // Detect and format the bot address
  const addr = '0x739Df18DA29e0B9A408a1a66015f63B035112fBa';
  if (text.includes(addr)) {
    text = text.replace(addr,
      `<span class="copy-addr"><span>${addr}</span><button class="copy-mini" data-copy="${addr}">Copy</button></span>`
    );
  }

  // Convert newlines to paragraphs
  const paras = text.split(/\n\n+/).filter(p => p.trim());
  return paras.map(p => {
    const lines = p.split('\n').join('<br>');
    return `<p>${lines}</p>`;
  }).join('');
}

// ── API Call ──────────────────────────────────────────────────────────────────

async function callClaude(userMessage) {
  conversation.push({ role: 'user', content: userMessage });

  const response = await fetch('https://api.fenix-yield.com/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model:      'claude-sonnet-4-6',
      max_tokens: 1000,
      system:     SYSTEM_PROMPT,
      messages:   conversation,
    })
  });

  if (!response.ok) {
    const err = await response.json().catch(() => ({}));
    throw new Error(err?.error?.message || `HTTP ${response.status}`);
  }

  const data  = await response.json();
  const reply = data.content?.[0]?.text || 'Sorry, something went wrong. Please try again.';

  conversation.push({ role: 'assistant', content: reply });

  return reply;
}

// ── Send message ──────────────────────────────────────────────────────────────

window.sendMessage = async function() {
  if (isTyping) return;
  const input = document.getElementById('userInput');
  const text  = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('quickReplies').innerHTML = '';
  document.getElementById('sendBtn').disabled = true;

  addMessage('user', `<p>${text}</p>`);
  isTyping = true;
  showTyping();

  try {
    const reply = await callClaude(text);
    hideTyping();

    const stepComplete = reply.includes('[STEP_COMPLETE]');
    const html = formatBotResponse(reply);
    addMessage('bot', html);

    if (stepComplete) {
      markStepComplete();
      // Add step badge to last bot message
      const lastBubble = document.querySelector('.msg.bot:last-child .msg-bubble');
      if (lastBubble && currentStep < STEPS.length) {
        const badge = document.createElement('div');
        badge.className = 'step-badge';
        badge.innerHTML = `✓ Step ${currentStep} complete — ${STEPS[currentStep - 1]} done!`;
        lastBubble.appendChild(badge);
      }
      // Show next step quick replies
      setQuickReplies(['Continue to next step', 'I have a question first']);
    } else {
      // Context-aware quick replies based on current step
      const stepReplies = [
        ['I installed all 3 apps ✓', 'What is MetaMask?', 'I only have iPhone'],
        ['I created my MetaMask wallet ✓', 'What is a seed phrase?', 'I forgot my password'],
        ['I bought ETH ✓', 'Which exchange should I use?', 'How much ETH do I need?'],
        ['I created my Safe wallet ✓', 'What is a Safe wallet?', 'I got an error'],
        ['I added the bot address ✓', "Where is Settings → Owners?", 'What does this do?'],
        ['I sent ETH to my Safe ✓', 'How do I check it arrived?', 'How much should I send?'],
        ['Safe Mobile is set up ✓', 'I cannot connect MetaMask', 'Where do I enable notifications?'],
        ['I got my chat ID ✓', 'I cannot find @userinfobot', 'What is a chat ID?'],
        ['I registered with the bot ✓', 'How do I subscribe to a paid tier?', 'The bot is not responding', 'How do I manage transactions?', 'What tier am I on?'],
        ['🎉 All done!', 'How do I clear the queue?', 'My transaction is stuck', 'When do I get weekly reports?'],
      ['How do I reject a transaction?', 'What is a nonce?', 'My queue has old transactions', 'How does auto-harvest work?', 'What is the whitelist?'],
      ];
      const replies = stepReplies[Math.min(currentStep, stepReplies.length - 1)];
      if (replies) setQuickReplies(replies);
    }

  } catch (err) {
    hideTyping();
    addMessage('bot', `<p>Sorry, I had trouble connecting. Please try again in a moment.</p>`);
    console.error(err);
  }

  isTyping = false;
  document.getElementById('sendBtn').disabled = false;
};

// ── Input auto-resize + enter to send ────────────────────────────────────────

const input = document.getElementById('userInput');
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// ── Initial greeting ──────────────────────────────────────────────────────────

function init() {
  updateProgress();

  const greeting = `<p>👋 Hi! I'm your Fenix Yield setup assistant.</p>
<p>I'll walk you through everything you need to get started earning automated ETH yield — no crypto experience needed.</p>
